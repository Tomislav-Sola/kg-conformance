# CI/CD: on push to main, test the app, build and push the image to ghcr,
# then update the live Azure Container App to the new image via OIDC.
# Deployment facts live in PLAN.md under "Phase 2 deployment (live)".
name: deploy

on:
  push:
    branches: [main]
    # Doc-only changes do not affect the image, so they skip the deploy.
    # workflow_dispatch still allows a manual run when needed.
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - "docs/**"
  workflow_dispatch:

permissions:
  id-token: write   # OIDC token for azure/login
  contents: read
  packages: write   # push to ghcr

env:
  IMAGE: ghcr.io/tomislav-sola/kg-conformance

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,observability]"
          pytest -q

      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Log in to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          az config set extension.use_dynamic_install=yes_without_prompt
          az containerapp update \
            --name ca-kg-conformance \
            --resource-group rg-kg-conformance \
            --image ${{ env.IMAGE }}:${{ github.sha }}
